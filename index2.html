<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Cartão de Perfil</title>
    <style>
        
        body {
            font-family: sans-serif;
    
            background-color: #f4f4f4; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 250px;
        }

        .foto {
            width: 100px;
            height: 100px;
            background-color: #ddd;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
        }

        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="foto"></div> <h2 id="nomeUsuario">Lukas Cruz</h2>
        <p>Desenvolvedor Web</p>
        <button onclick="mostrarMensagem()">Clique Aqui</button>
    </div>

    <script>
        function mostrarMensagem() {
            
            var nome = document.getElementById('nomeUsuario').innerText;
            alert("Olá, " + nome + "!");
        }
    </script>

</body>
</html>
